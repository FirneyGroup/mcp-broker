services:
  broker:
    build: .
    container_name: mcp-broker
    restart: unless-stopped
    env_file: .env
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./settings.yaml:/app/settings.yaml:ro
    # --- Sidecar connectors ---
    # Uncomment to let the broker reach local sidecar MCP servers
    # (workspace-mcp, bigquery-toolbox, etc.). Requires the external
    # network to exist first: `docker network create sidecar-internal`
    # networks:
    #   - sidecar-internal

# Uncomment together with the networks block above.
# networks:
#   sidecar-internal:
#     external: true
