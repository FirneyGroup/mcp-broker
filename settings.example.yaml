broker:
  host: 0.0.0.0
  port: 8002
  log_level: INFO
  connectors:
    - hubspot
    - notion
    - slack
    - workspace_mcp
  admin_key: ${BROKER_ADMIN_KEY}           # For /admin/* endpoints (X-Admin-Key header)
  encryption_keys:
    - ${BROKER_ENCRYPTION_KEY}
  state_secret: ${BROKER_STATE_SECRET}
  # success_redirect_url: https://your-dashboard.example.com/connections
  # Optional. After a successful outbound OAuth connect, the operator's
  # browser is redirected here. When unset, the broker bounces to its own
  # built-in /oauth/success page — sensible default that needs no operator
  # setup. Override only when you have a real dashboard to land on.
  public_url: http://localhost:8002/     # Public base URL for OAuth callbacks (must include trailing slash)
  # token_refresh_enabled: true          # Background token refresh loop (default: true)
  # token_refresh_interval_seconds: 300  # How often to scan for expiring tokens (default: 300)
  # Inbound OAuth 2.1 — required for claude.ai-style remote MCP clients (and any
  # other RFC 8414/9728-conformant MCP client). When enabled the broker exposes
  # /oauth/{register,authorize,token,revoke} + /.well-known/oauth-* and validates
  # `Authorization: Bearer mcp_at_...` on /proxy/*. Requires single-worker uvicorn
  # (the DCR rate limiter is in-memory).
  # oauth:
  #   enabled: true
  #   app_key: my_company:app1               # must match an entry in `clients:` below
  #   db_path: ./data/inbound_oauth.db
  #   access_token_ttl_seconds: 3600
  #   refresh_token_ttl_seconds: 2592000     # 30 days
  #   code_ttl_seconds: 60
  #   dcr_rate_limit_per_ip: 10
  #   dcr_rate_limit_window_seconds: 900     # 15 min
  #   # Exact-match allowlist of accepted client redirect_uris. With no identity
  #   # layer at /oauth/authorize, this list IS the security boundary. Default
  #   # covers claude.ai web; add entries for other remote MCP clients you trust
  #   # (Cursor, Windsurf, custom). HTTPS-only — loopback is a v1.5 item.
  #   allowed_redirect_uris:
  #     - https://claude.ai/api/mcp/auth_callback
  #     - https://claude.com/api/mcp/auth_callback

store:
  backend: sqlite
  sqlite:
    db_path: ./data/tokens.db

# Per-app auth config — scopes and connector access control.
# API keys are managed via the admin API (POST /admin/keys), not stored in YAML.
# After deploy, create keys: curl -X POST /admin/keys -H "X-Admin-Key: ..." -d '{"app_key": "my_company:app1"}'
clients:
  my_company:
    app1:
      scopes: [proxy, status]                              # Available scopes: proxy, status
      allowed_connectors: [hubspot, notion, slack, workspace_mcp] # Empty list = all connectors

# Only needed for static connectors (discovery connectors get credentials automatically)
apps:
  my_company:
    app1:
      hubspot:
        client_id: ${HUBSPOT_CLIENT_ID}
        client_secret: ${HUBSPOT_CLIENT_SECRET}
      twitter:
        client_id: ${TWITTER_OAUTH2_CLIENT_ID}
        client_secret: ${TWITTER_OAUTH2_CLIENT_SECRET}
      workspace_mcp:
        client_id: ${GOOGLE_OAUTH_CLIENT_ID}
        client_secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
      slack:
        client_id: ${SLACK_CLIENT_ID}
        client_secret: ${SLACK_CLIENT_SECRET}
