name: Claude Code

# Two entry points share one workflow:
# 1. Auto PR review on opened/synchronize/ready_for_review/reopened (skip bots)
# 2. Manual @claude mentions in PR/issue comments + reviews

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.user.type != 'Bot') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@4d7e1f0cd85743fdc93b1c8040ab54395da024e2  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Lets Claude read CI results (gh run view) when diagnosing failures.
          additional_permissions: |
            actions: read

          prompt: |
            Review PR #${{ github.event.pull_request.number || github.event.issue.number }} in mcp-broker.

            Project rules are in AGENTS.md (imported via CLAUDE.md). Read them before flagging anything;
            many "issues" you might initially see are deliberate per the project's documented invariants.

            Before flagging an issue, read surrounding code in the changed files to
            understand existing patterns. For each issue, explain the concrete consequence —
            what breaks, what's exploitable, or what data is lost. If you can't articulate a
            specific consequence, don't flag it.

            FOCUS AREAS (in priority order):
            1. Bugs and logic errors — incorrect behavior, off-by-one, race conditions
            2. Security — credential leaks, OAuth flow bypasses, missing PKCE, timing attacks,
               OWASP top 10, prompt-injection vectors in any code that processes untrusted input
            3. Missing error handling at system boundaries — OAuth flows, proxy forwarding,
               MCP upstream HTTP calls, SQLite transactions
            4. Dropped context — removed information that callers, logs, or downstream consumers
               depend on
            5. Architecture violations against AGENTS.md — connector contract drift, config schema
               drift, new exempt-path additions without justification

            ARCHITECTURE INVARIANTS (from AGENTS.md):
            - Broker MUST NOT import from any agent-framework SDK
            - Runtime config in settings.yaml; .env only for secrets via ${VAR} interpolation
            - Pydantic models use ConfigDict(extra="forbid"); never dataclasses
            - Every # noqa / # type: ignore has inline justification

            SECURITY INVARIANTS:
            - Outbound tokens encrypted at rest via MultiFernet (with key rotation)
            - Inbound bearer/refresh tokens SHA-256-hashed at rest (api-key pattern, validate-only)
            - PKCE S256 mandatory for all OAuth flows; "plain" rejected
            - Outbound OAuth state HMAC-signed with single-use nonces, ≤10-min TTL
            - hmac.compare_digest for all secret/key/token comparisons (never ==)
            - Internal headers stripped before forwarding to remote MCP servers
            - Inbound refresh rotation atomic under SQLite BEGIN IMMEDIATE; replay → family revoke
            - Inbound redirect_uri on strict claude.ai/claude.com allowlist
            - DCR X-Forwarded-For trusted only when request.client.host is in trusted_proxy_ips
            - Inbound OAuth requires single-worker uvicorn (in-memory rate limiter)
            - Log statements NEVER include raw tokens/keys/secrets — use hash_prefix(...)

            TESTING:
            - Tests must exercise real crypto (MultiFernet, HMAC, PKCE), real SQLite stores,
              and real middleware. Mock only outbound HTTP to upstream MCP servers.
            - Tests assert observable behavior — HTTP responses, persisted state, log records via
              caplog — not internal method calls via mock.assert_called_with.
            - Every new Security Invariant lands with a regression test that fails without the fix.

            DO NOT COMMENT ON:
            - Naming, formatting, import order (enforced by Ruff in CI)
            - Pre-existing issues in unchanged code
            - Missing docstrings or type annotations (pyright catches the latter)
            - Theoretical issues without a concrete failure scenario
            - Style preferences not codified in AGENTS.md

            Limit inline comments to the most important issues (aim for 5 or fewer).
            Use a top-level PR comment only for cross-cutting architectural observations.
            If changes are substantive and nothing needs flagging, leave a brief approval.
            For trivial changes (config, deps, docs), no comment is needed.

          # Review-only tool set — Claude can read code, inspect PRs/CI, and post
          # comments, but not write or push. For intentional code changes, open a
          # PR rather than letting Claude edit.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh run view:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"
