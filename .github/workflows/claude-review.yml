name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip if the CLAUDE_CODE_OAUTH_TOKEN secret is not configured (e.g. on forks).
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for mcp-broker.

            Before flagging an issue, read surrounding code in the changed files to
            understand existing patterns and conventions.

            For each issue, explain the concrete consequence — what breaks, what's
            exploitable, or what data is lost. If you cannot articulate a specific
            consequence, do not flag it.

            FOCUS AREAS (in priority order):
            1. Bugs and logic errors — incorrect behavior, off-by-one, race conditions,
               missing await, unclosed resources
            2. Security — credential leaks, OAuth flow bypasses, missing PKCE,
               timing attacks, SSRF, tenant isolation breaks, OWASP top 10
            3. Missing error handling — unhandled exceptions at system boundaries
               (OAuth flows, HTTP calls to remote MCP servers, SQLite writes)
            4. Breaking changes to the public surface — HTTP API, BaseConnector
               contract, settings.yaml schema, ./start CLI output formats.
               Flag any breaking change not documented in CHANGELOG.md under
               [Unreleased].
            5. Architecture violations — see rules below

            ARCHITECTURE RULES:
            - Broker is MCP-client-agnostic — no imports or assumptions about any
              specific agent framework (ADK, Claude, Cursor, custom). Reject code
              that couples to one client's SDK or class hierarchy.
            - Connectors subclass BaseConnector and auto-register via
              __init_subclass__. No manual register() calls.
            - All runtime configuration lives in settings.yaml. The .env file holds
              only secrets referenced via ${VAR} interpolation in YAML.
            - Config models use Pydantic with extra="forbid" so typos fail fast
              at startup.
            - Tokens encrypted at rest via MultiFernet (key rotation supported).
              Never log, serialize, or expose decrypted tokens.
            - Timing-safe comparison (hmac.compare_digest) for all key validation.
            - PKCE (S256) for every broker-managed OAuth flow.
            - OAuth state is HMAC-signed with single-use nonces and 10-minute TTL.
            - Internal headers (X-Broker-Key, X-App-Id, Authorization, Cookie,
              X-Forwarded-*) must be stripped before forwarding to upstream MCP
              servers.

            DO NOT COMMENT ON:
            - Naming, formatting, import order (enforced by Ruff in CI)
            - Pre-existing issues in unchanged code
            - Missing docstrings or type annotations on internal helpers
            - Theoretical issues without a concrete failure scenario
            - Style preferences

            Limit inline comments to the most important issues (aim for 5 or fewer).
            Use a top-level PR comment for cross-cutting architectural observations.
            For trivial changes (docs, config tweaks, dependency bumps), no comment
            is needed — skip rather than filling space.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"
