name: Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      # FirneyGroup fork of anthropics/claude-code-security-review with OAuth
      # support (upstream PR #41) merged in. Pinned to commit SHA per the
      # repo's third-party-action policy. Switch to the upstream action and
      # re-pin once anthropics merges PR #41.
      - uses: FirneyGroup/claude-code-security-review@657c44557a3ef75ddbc3e684e3f455e5d87773b0  # main
        with:
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          comment-pr: true
          upload-results: true
