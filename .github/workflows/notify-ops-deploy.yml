name: Notify ops repo to redeploy

# Fires a repository_dispatch event at FirneyGroup/firney-mcp-broker-ops
# whenever changes land on this repo's main branch that affect the runtime
# image. The ops repo's deploy.yml has a matching `repository_dispatch:
# types: [broker-updated]` trigger that picks this up and redeploys.
#
# This workflow is a no-op for forks: it requires the GH_PAT secret, which
# only exists in Firney's deployment. If the secret isn't set the dispatch
# step is skipped with a warning in the run log.
#
# Internal setup (Firney): GH_PAT is the org-level PAT also used by the
# Hammerson Next.js repos for private-submodule access. To activate the
# dispatch:
#   1. In the org secret's settings, add this repo (FirneyGroup/mcp-broker)
#      to the selected-repositories allow list so secrets.GH_PAT resolves here.
#   2. Ensure the PAT itself has `Actions: read and write` permission on
#      FirneyGroup/firney-mcp-broker-ops (in addition to its existing
#      contents:read for submodules). Edit the PAT at
#      https://github.com/settings/personal-access-tokens to add this.
#   3. Push any change matching the path filters below to verify the
#      dispatch fires and the ops repo's Deploy MCP Broker workflow runs.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/notify-ops-deploy.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: notify-ops-deploy
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check dispatch secret is configured
        id: check
        env:
          HAS_TOKEN: ${{ secrets.GH_PAT != '' }}
        run: |
          if [ "${HAS_TOKEN}" != "true" ]; then
            echo "::warning::GH_PAT secret is not set; skipping dispatch."
            echo "::warning::Forks of this repo can ignore this. To enable in the canonical repo, follow the setup notes at the top of this file."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch broker-updated event
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: FirneyGroup/firney-mcp-broker-ops
          event-type: broker-updated
          client-payload: |
            {
              "broker_ref": "${{ github.sha }}",
              "broker_short_sha": "${{ github.sha }}",
              "triggered_by": "${{ github.actor }}",
              "commit_message": ${{ toJSON(github.event.head_commit.message) }}
            }
