# Dependabot config — keeps SHA-pinned third-party actions current.
#
# Workflow files reference actions by commit SHA (not floating tags like `@v1`)
# to close the "tag moved to malicious commit" leak vector. Dependabot opens
# weekly PRs that bump those SHAs as upstream releases happen, so the pinning
# doesn't go stale.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      include: scope
