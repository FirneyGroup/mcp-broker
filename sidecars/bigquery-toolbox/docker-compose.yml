# =============================================================================
# Sidecar: BigQuery MCP Toolbox for Databases
#
# Google's MCP Toolbox running with useClientOAuth=true.
# Trusts Bearer tokens injected by the broker (same pattern as workspace-mcp).
#
# Setup:
#   docker network create sidecar-internal  # once
#   docker compose up -d
# =============================================================================

services:
  bigquery-toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:0.30.0
    container_name: bigquery-toolbox
    platform: linux/amd64
    restart: unless-stopped
    command:
      - --tools-file=/config/tools.yaml
      - --address=0.0.0.0
      - --port=5000
    volumes:
      - ./tools.yaml:/config/tools.yaml:ro
    ports:
      - "${BQ_TOOLBOX_HOST_PORT:-5000}:5000"
    networks:
      - sidecar-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  sidecar-internal:
    external: true
