# =============================================================================
# Sidecar: Google Workspace MCP
#
# Community MCP server with native HTTP transport.
# Runs in External OAuth Provider mode — trusts Bearer tokens injected by the broker.
# The broker manages Google OAuth per-app.
#
# Pinned to a tested commit. To upgrade:
#   1. Update the SHA below
#   2. docker compose build && docker compose up -d
#   3. Verify: curl http://localhost:8010/mcp (should return health JSON)
#
# Setup:
#   docker network create sidecar-internal  # once
#   docker compose build && docker compose up -d
# =============================================================================

services:
  workspace-mcp:
    build: https://github.com/taylorwilsdon/google_workspace_mcp.git#7fe01c1b8612c71cd4485b8eb5fd07013292a84a
    container_name: workspace-mcp
    restart: unless-stopped
    entrypoint: ["uv", "run", "main.py", "--transport", "streamable-http"]
    environment:
      - WORKSPACE_MCP_PORT=8000
      - WORKSPACE_MCP_HOST=0.0.0.0
      - MCP_ENABLE_OAUTH21=true
      - EXTERNAL_OAUTH21_PROVIDER=true
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
    ports:
      - "${HOST_PORT:-8010}:8000"
    networks:
      - sidecar-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


networks:
  sidecar-internal:
    external: true
